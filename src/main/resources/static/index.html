<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voto-Fi - 투표 시스템</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .tab:hover {
            background: #667eea;
            color: white;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }
        .content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .vote-list {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }
        .vote-item {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
        }
        .vote-item h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .candidate-list {
            margin-top: 10px;
        }
        .candidate-item {
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .vote-btn {
            background: #28a745;
            padding: 5px 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗳️ Voto-Fi 투표 시스템</h1>
            <p>REST API 테스트 페이지</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('register')">회원가입</button>
            <button class="tab" onclick="showTab('login')">로그인</button>
            <button class="tab" onclick="showTab('vote')">투표 목록</button>
            <button class="tab" onclick="showTab('create')">투표 생성</button>
        </div>

        <!-- 회원가입 -->
        <div id="register" class="content active">
            <h2>회원가입</h2>
            <div class="form-group">
                <label>사용자명:</label>
                <input type="text" id="reg-username" placeholder="username">
            </div>
            <div class="form-group">
                <label>비밀번호:</label>
                <input type="password" id="reg-password" placeholder="password">
            </div>
            <div class="form-group">
                <label>이메일:</label>
                <input type="email" id="reg-email" placeholder="email@example.com">
            </div>
            <button onclick="register()">회원가입</button>
            <div id="register-result" class="result" style="display:none;"></div>
        </div>

        <!-- 로그인 -->
        <div id="login" class="content">
            <h2>로그인</h2>
            <div class="form-group">
                <label>사용자명:</label>
                <input type="text" id="login-username" placeholder="username">
            </div>
            <div class="form-group">
                <label>비밀번호:</label>
                <input type="password" id="login-password" placeholder="password">
            </div>
            <button onclick="login()">로그인</button>
            <button onclick="logout()">로그아웃</button>
            <button onclick="checkSession()">세션 확인</button>
            <div id="login-result" class="result" style="display:none;"></div>
        </div>

        <!-- 투표 목록 -->
        <div id="vote" class="content">
            <h2>진행 중인 투표</h2>
            <button onclick="loadVotes()">투표 목록 새로고침</button>
            <div id="vote-list" class="vote-list"></div>
        </div>

        <!-- 투표 생성 -->
        <div id="create" class="content">
            <h2>투표 주제 생성</h2>
            <div class="form-group">
                <label>제목:</label>
                <input type="text" id="vote-title" placeholder="투표 제목">
            </div>
            <div class="form-group">
                <label>설명:</label>
                <textarea id="vote-description" rows="3" placeholder="투표 설명"></textarea>
            </div>
            <div class="form-group">
                <label>마감 시간:</label>
                <input type="datetime-local" id="vote-deadline">
            </div>
            <button onclick="createVoteTopic()">투표 주제 생성</button>
            <div id="create-result" class="result" style="display:none;"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function showTab(tabName) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function showResult(elementId, message, isSuccess) {
            const result = document.getElementById(elementId);
            result.style.display = 'block';
            result.textContent = JSON.stringify(message, null, 2);
            result.className = 'result ' + (isSuccess ? 'success' : 'error');
        }

        async function register() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const email = document.getElementById('reg-email').value;

            try {
                const response = await fetch(`${API_BASE}/user/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });
                const data = await response.json();
                showResult('register-result', data, data.success);
            } catch (error) {
                showResult('register-result', { success: false, message: error.message }, false);
            }
        }

        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_BASE}/user/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                showResult('login-result', data, data.success);
            } catch (error) {
                showResult('login-result', { success: false, message: error.message }, false);
            }
        }

        async function logout() {
            try {
                const response = await fetch(`${API_BASE}/user/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
                const data = await response.json();
                showResult('login-result', data, data.success);
            } catch (error) {
                showResult('login-result', { success: false, message: error.message }, false);
            }
        }

        async function checkSession() {
            try {
                const response = await fetch(`${API_BASE}/user/check`, {
                    credentials: 'include'
                });
                const data = await response.json();
                showResult('login-result', data, true);
            } catch (error) {
                showResult('login-result', { success: false, message: error.message }, false);
            }
        }

        async function loadVotes() {
            try {
                const response = await fetch(`${API_BASE}/votetopic/ongoing`);
                const votes = await response.json();
                const voteList = document.getElementById('vote-list');
                voteList.innerHTML = '';

                if (votes.length === 0) {
                    voteList.innerHTML = '<p>진행 중인 투표가 없습니다.</p>';
                    return;
                }

                for (const vote of votes) {
                    const voteItem = document.createElement('div');
                    voteItem.className = 'vote-item';
                    voteItem.innerHTML = `
                        <h3>${vote.title}</h3>
                        <p>${vote.description || ''}</p>
                        <p><strong>마감:</strong> ${new Date(vote.deadline).toLocaleString('ko-KR')}</p>
                        <div class="candidate-list" id="candidates-${vote.id}"></div>
                    `;
                    voteList.appendChild(voteItem);
                    loadCandidates(vote.id);
                }
            } catch (error) {
                document.getElementById('vote-list').innerHTML = `<p style="color:red;">오류: ${error.message}</p>`;
            }
        }

        async function loadCandidates(voteTopicId) {
            try {
                const response = await fetch(`${API_BASE}/candidate/votetopic/${voteTopicId}`);
                const candidates = await response.json();
                const candidateList = document.getElementById(`candidates-${voteTopicId}`);
                candidateList.innerHTML = '';

                candidates.forEach(candidate => {
                    const candidateItem = document.createElement('div');
                    candidateItem.className = 'candidate-item';
                    candidateItem.innerHTML = `
                        <span><strong>${candidate.name}</strong> - ${candidate.voteCount}표</span>
                        <button class="vote-btn" onclick="vote(${candidate.id})">투표하기</button>
                    `;
                    candidateList.appendChild(candidateItem);
                });
            } catch (error) {
                console.error('후보 로드 오류:', error);
            }
        }

        async function vote(candidateId) {
            try {
                const response = await fetch(`${API_BASE}/voterecord`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ candidateId })
                });
                const data = await response.json();
                if (data.success) {
                    alert('투표가 완료되었습니다!');
                    loadVotes();
                } else {
                    alert('오류: ' + data.message);
                }
            } catch (error) {
                alert('오류: ' + error.message);
            }
        }

        async function createVoteTopic() {
            const title = document.getElementById('vote-title').value;
            const description = document.getElementById('vote-description').value;
            const deadline = document.getElementById('vote-deadline').value;

            if (!title || !deadline) {
                showResult('create-result', { success: false, message: '제목과 마감 시간을 입력해주세요.' }, false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/votetopic`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description, deadline })
                });
                const data = await response.json();
                showResult('create-result', data, data.success);
                if (data.success) {
                    document.getElementById('vote-title').value = '';
                    document.getElementById('vote-description').value = '';
                    document.getElementById('vote-deadline').value = '';
                }
            } catch (error) {
                showResult('create-result', { success: false, message: error.message }, false);
            }
        }

        // 페이지 로드 시 투표 목록 자동 로드
        window.addEventListener('load', () => {
            loadVotes();
        });
    </script>
</body>
</html>
